name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create test .env
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          MONGODB_URI=mongodb://localhost:27017
          MONGODB_DB_NAME=courses_system_test
          JWT_SECRET_KEY=ci-test-secret-key-at-least-32-characters-long
          PSEUDONYM_SALT=ci-test-salt-value-at-least-32-characters-long
          GEMINI_API_KEY=
          GEMINI_MODEL=gemini-1.5-flash
          EOF

      - name: Run pytest (if tests exist)
        working-directory: backend
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            python -m pytest -v
          else
            echo "No test files found, skipping pytest"
          fi

      - name: Verify backend starts
        working-directory: backend
        run: |
          timeout 10 python -m app.main &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          echo "Backend health check passed"

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build

  railway-validate:
    name: Railway Config Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate railway.toml exists
        run: |
          if [ ! -f "railway.toml" ]; then
            echo "ERROR: railway.toml not found"
            exit 1
          fi
          echo "railway.toml found"
          cat railway.toml

      - name: Validate backend Dockerfile builds
        run: docker build -f Dockerfile -t courses-api-test .

      - name: Validate frontend Dockerfile builds
        working-directory: frontend
        run: docker build -f Dockerfile.frontend -t courses-frontend-test .
